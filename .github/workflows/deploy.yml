name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/efactura-app

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Compile and package
        run: mvn -B -DskipTests package

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: API_EFACTURA_CI_CD
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          IMAGE_LATEST: ${{ env.IMAGE_NAME }}:latest
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.EFACTURA_APP_GHCR_PAT }}
          APP_DIR: ${{ secrets.EFACTURA_APP_DEPLOY_PATH }}
          REPO_OWNER: ${{ github.repository_owner }}
        with:
          host: ${{ secrets.EFACTURA_APP_DEPLOY_HOST }}
          username: ${{ secrets.EFACTURA_APP_DEPLOY_USER }}
          key: ${{ secrets.EFACTURA_APP_DEPLOY_SSH_KEY }}
          port: ${{ secrets.EFACTURA_APP_DEPLOY_PORT }}
          envs: IMAGE,IMAGE_LATEST,GHCR_USER,GHCR_TOKEN,APP_DIR,REPO_OWNER
          script: |
            set -euo pipefail
            DEPLOY_DIR="${APP_DIR:-/opt/efactura-app}"
            cd "$DEPLOY_DIR"

            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            docker pull "$IMAGE"
            docker tag "$IMAGE" "$IMAGE_LATEST"
            export GITHUB_REPOSITORY_OWNER="$REPO_OWNER"

            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            sleep 20
            docker logs efactura-app --tail=300 || true
            docker image prune -f

            echo "Diagnostico post-deploy"
            docker ps -a
            docker compose -f docker-compose.prod.yml ps
            docker inspect efactura-app --format='Status={{.State.Status}} Health={{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}} ExitCode={{.State.ExitCode}}'
            docker port efactura-app || true
            ss -tulpn | grep 8080 || true

            echo "Esperando healthcheck..."
            for i in {1..30}; do
              echo "Intento $i/30"
              curl -v --max-time 5 http://127.0.0.1:8080/actuator/health || true
              docker inspect efactura-app --format='Status={{.State.Status}} Health={{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}'
              docker logs efactura-app --tail=120 || true
              docker exec efactura-app wget -qO- http://127.0.0.1:8080/actuator/health || true
              if curl -sf --max-time 5 http://127.0.0.1:8080/actuator/health; then
                echo "Aplicacion iniciada correctamente"
                exit 0
              fi
              sleep 10
            done

            echo "La aplicacion no respondio a tiempo"
            docker compose -f docker-compose.prod.yml logs --tail=300
            exit 1
